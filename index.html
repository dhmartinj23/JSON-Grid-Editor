<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Json Grid Editor</title>
    <style>
        :root {
            /* Palette inspired by the uploaded image */
            --red-1: #ff000d;
            --red-2: #c80000;
            --white: #ffffff;
            --gray-1: #efefef;
            --gray-2: #d8d8d8;
            --gray-3: #b2b2b2;
            --gray-4: #7d7d7d;
            --gray-5: #494949;
            --gray-6: #1f1f22;
            --black: #000000;
            --accent-cyan: #20c0d8;
            --accent-blue: #1868e6;
            --accent-green: #0aa34a;
            --accent-yellow: #f1cf00;
            --accent-magenta: #f000a6;
            --split-left: 28%;
            --app-bg: var(--gray-1);
            --panel-bg: var(--white);
            --panel-alt-bg: #fafafa;
            --editor-bg: #fbfbfb;
            --gutter-bg: #f6f6f6;
            --gutter-fg: #4c4c4c;
            --text-main: #1e1e1e;
            --muted-text: #666666;
            --viewer-bg: #ffffff;
            --viewer-border: #444444;
            --viewer-header-bg: #f3f3f3;
            --viewer-key: #001080;
            --viewer-object: #267F99;
            --viewer-array: #795E26;
            --viewer-string: #A31515;
            --viewer-number: #098658;
            --viewer-literal: #0000FF;
            --focus-bg: #edf4ff;
            --focus-border: #7ea7ff;
        }

        body.dark {
            --app-bg: #1e1e1e;
            --panel-bg: #252526;
            --panel-alt-bg: #1e1e1e;
            --editor-bg: #1e1e1e;
            --gutter-bg: #252526;
            --gutter-fg: #858585;
            --text-main: #d4d4d4;
            --muted-text: #9da0a6;
            --viewer-bg: #1e1e1e;
            --viewer-border: #c5c5c5;
            --viewer-header-bg: #2d2d30;
            --viewer-key: #9cdcfe;
            --viewer-object: #4EC9B0;
            --viewer-array: #DCDCAA;
            --viewer-string: #CE9178;
            --viewer-number: #B5CEA8;
            --viewer-literal: #569CD6;
            --focus-bg: #22324a;
            --focus-border: #4f8cff;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: var(--app-bg);
            color: var(--text-main);
            overflow: hidden
        }

        button,
        input,
        textarea {
            font: inherit
        }

        .page-shell {
            height: 100%;
            display: flex;
            flex-direction: column
        }

        .app-titlebar {
            background: linear-gradient(90deg, var(--gray-6), #232428);
            color: var(--white);
            border-bottom: 4px solid var(--red-1);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px
        }

        .titlebar-right {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .theme-switch {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #f3f3f3
        }

        .theme-switch input {
            appearance: none;
            width: 42px;
            height: 22px;
            border-radius: 999px;
            border: 1px solid #5f5f5f;
            background: #3b3b3b;
            position: relative;
            cursor: pointer;
            transition: background .2s ease, border-color .2s ease
        }

        .theme-switch input::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            transition: transform .2s ease
        }

        .theme-switch input:checked {
            background: var(--accent-blue);
            border-color: var(--accent-blue)
        }

        .theme-switch input:checked::before {
            transform: translateX(20px)
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: .2px
        }

        .app-subtitle {
            font-size: 12px;
            color: #d7d7d7;
            margin-top: 2px
        }

        .app-credit {
            font-size: 12px;
            color: #f3f3f3;
            padding: 6px 10px;
            border: 1px solid #505050;
            border-radius: 4px;
            background: rgba(255, 255, 255, .04)
        }

        .workspace {
            display: grid;
            grid-template-columns: var(--split-left) 14px minmax(300px, 1fr);
            height: calc(100% - 58px);
            min-height: 0
        }

        .panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            background: var(--panel-bg)
        }

        .divider {
            background: var(--gray-2);
            position: relative;
            cursor: col-resize;
            border-left: 1px solid var(--gray-3);
            border-right: 1px solid var(--gray-3)
        }

        .divider::before {
            content: '◀▶';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--gray-3);
            color: #143249;
            border: 1px solid var(--gray-4);
            border-radius: 12px;
            padding: 34px 3px;
            font-size: 15px;
            letter-spacing: -2px
        }

        .toolbar {
            height: 42px;
            background: linear-gradient(90deg, var(--gray-6), #232428);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
            color: var(--white);
            border-bottom: 1px solid var(--black);
            overflow: visible
        }

        .toolbar-title {
            font-weight: 700;
            padding: 0 10px;
            min-width: 95px;
            white-space: nowrap
        }

        .theme-toggle {
            margin-left: auto
        }

        .theme-toggle .toolbtn {
            min-width: 96px
        }

        .toolbar .right {
            margin-left: auto;
            display: flex;
            gap: 6px
        }

        .json-toolbar-group {
            display: flex;
            gap: 6px
        }

        .grid-toolbar-group {
            display: flex;
            gap: 6px;
            align-items: center;
            position: relative;
            margin-left: 4px;
        }

        .columns-panel {
            position: absolute;
            top: 34px;
            left: 0;
            min-width: 280px;
            max-width: 360px;
            max-height: 320px;
            background: var(--panel-bg);
            border: 1px solid var(--gray-3);
            border-radius: 4px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .35);
            z-index: 25;
            color: var(--text-main);
            display: none;
            flex-direction: column;
            padding: 0;
        }

        .columns-panel {
            scrollbar-width: thin;
            scrollbar-color: var(--gray-4) var(--panel-alt-bg);
        }

        .columns-panel::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .columns-panel::-webkit-scrollbar-track {
            background: var(--panel-alt-bg);
            border-radius: 8px;
        }

        .columns-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--gray-4), var(--gray-5));
            border-radius: 8px;
            border: 2px solid var(--panel-alt-bg);
        }

        .columns-panel::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--accent-blue), #2a79ee);
        }

        .columns-panel.open {
            display: flex;
        }

        .columns-panel-title {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            padding: 8px 8px 0 8px;
        }

        .columns-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .columns-search {
            min-height: 28px;
            border: 1px solid var(--gray-3);
            background: var(--panel-alt-bg);
            color: var(--text-main);
            border-radius: 3px;
            padding: 0 8px;
            font-size: 12px;
            margin: 8px 8px 8px 8px;
        }

        .columns-action-btn {
            border: 1px solid var(--gray-3);
            background: var(--panel-alt-bg);
            color: var(--text-main);
            border-radius: 3px;
            font-size: 11px;
            padding: 3px 6px;
            cursor: pointer;
        }

        .columns-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 8px 8px;
            min-height: 0;
        }

        .columns-footer-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            padding: 8px;
            border-top: 1px solid var(--gray-2);
            flex-shrink: 0;
        }

        .columns-panel-resize-handle {
            height: 4px;
            background: linear-gradient(180deg, transparent, var(--gray-3));
            cursor: row-resize;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .columns-panel-resize-handle:hover {
            background: linear-gradient(180deg, var(--gray-3), var(--gray-4));
        }

        .column-item {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--gray-2);
            background: var(--panel-alt-bg);
            border-radius: 4px;
            padding: 4px 6px;
        }

        .column-item input[type="checkbox"] {
            cursor: pointer;
            flex: 0 0 auto;
        }

        .column-item.dragging {
            opacity: .45;
        }

        .column-item.drop-before::before {
            content: '';
            position: absolute;
            left: -4px;
            right: -4px;
            top: -3px;
            height: 5px;
            background: var(--red-1);
            border-radius: 2px;
        }

        .column-item.drop-after::after {
            content: '';
            position: absolute;
            left: -4px;
            right: -4px;
            bottom: -3px;
            height: 5px;
            background: var(--red-1);
            border-radius: 2px;
        }

        .column-drag {
            cursor: grab;
            user-select: none;
            color: var(--muted-text);
            font-size: 14px;
            line-height: 1;
        }

        .column-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }

        .toolbtn {
            height: 30px;
            padding: 0 10px;
            border: none;
            border-radius: 2px;
            color: var(--white);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap
        }

        .toolbtn.red {
            background: var(--red-1)
        }

        .toolbtn.red2 {
            background: var(--red-2)
        }

        .toolbtn.blue {
            background: var(--accent-blue)
        }

        .toolbtn.green {
            background: var(--accent-green)
        }

        .toolbtn.yellow {
            background: var(--accent-yellow);
            color: #222
        }

        .toolbtn.cyan {
            background: var(--accent-cyan);
            color: #083843
        }

        .toolbtn.magenta {
            background: var(--accent-magenta)
        }

        .toolbtn.gray {
            background: var(--gray-4)
        }

        .toolbtn:hover {
            filter: brightness(1.05)
        }

        .editor-wrap {
            display: block;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            background: var(--panel-alt-bg)
        }

        .json-editor-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 0;
            overflow: hidden
        }

        .json-scroll {
            display: grid;
            grid-template-columns: 46px 1fr;
            width: 100%;
            height: 100%;
            min-height: 0;
            overflow: hidden;
            position: relative
        }

        .json-highlighter {
            position: absolute;
            top: 0;
            left: 46px;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: auto;
            line-height: 22px;
            font-family: Consolas, monospace;
            font-size: 13px;
            padding: 10px 14px 10px 16px;
            white-space: pre;
            word-wrap: break-word;
            word-break: break-all;
            color: var(--text-main);
            user-select: none;
            font-weight: normal
        }

        .json-highlighter .json-key {
            color: var(--viewer-key);
            font-weight: normal
        }

        .json-highlighter .json-string {
            color: var(--viewer-string)
        }

        .json-highlighter .json-number {
            color: var(--viewer-number)
        }

        .json-highlighter .json-boolean,
        .json-highlighter .json-null {
            color: var(--viewer-literal)
        }

        .json-highlighter .json-punc {
            color: var(--text-main)
        }

        .json-panel-view {
            width: 100%;
            height: 100%;
            min-height: 0
        }

        .json-panel-view.hidden {
            display: none
        }

        .json-monaco {
            width: 100%;
            height: 100%;
            min-height: 0;
            background: var(--editor-bg);
            display: none;
        }

        .gutter {
            background: var(--gutter-bg);
            border-right: 1px solid var(--gray-2);
            overflow: auto;
            padding-top: 6px;
            color: var(--gutter-fg);
            min-height: 0;
            scrollbar-width: none
        }

        .gutter::-webkit-scrollbar {
            width: 0;
            height: 0
        }

        .line {
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 12px
        }

        .json-area {
            grid-column: 2;
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            padding: 10px 14px 10px 16px;
            font-family: Consolas, monospace;
            font-size: 13px;
            line-height: 22px;
            color: transparent;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            overflow: auto;
            white-space: pre;
            min-height: 0;
            position: relative;
            z-index: 2;
            caret-color: var(--text-main)
        }

        .json-area::placeholder {
            color: var(--muted-text);
            -webkit-text-fill-color: var(--muted-text);
        }

        .json-area::selection {
            background: rgba(102, 153, 255, 0.32);
            text-shadow: none;
        }

        .json-highlighter .json-error {
            color: #d81b1b;
            text-decoration: underline wavy #d81b1b;
            text-underline-offset: 2px;
        }

        .json-tree-wrap {
            width: 100%;
            height: 100%;
            overflow: auto;
            background: var(--editor-bg);
            color: var(--text-main);
            padding: 10px 14px 10px 16px;
            font-family: Consolas, monospace;
            font-size: 13px;
            line-height: 22px;
            white-space: nowrap
        }

        .json-tree-empty {
            color: var(--muted-text)
        }

        .json-tree-line {
            min-height: 22px
        }

        .json-indent {
            display: inline-block;
            width: 18px
        }

        .json-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            margin-right: 4px;
            border: 1px solid var(--viewer-border);
            border-radius: 3px;
            cursor: pointer;
            user-select: none;
            font-size: 11px;
            line-height: 1
        }

        .json-toggle-spacer {
            display: inline-block;
            width: 20px
        }

        .json-punc {
            color: var(--text-main)
        }

        .json-key {
            color: var(--viewer-key)
        }

        .json-string {
            color: var(--viewer-string)
        }

        .json-number {
            color: var(--viewer-number)
        }

        .json-boolean,
        .json-null {
            color: var(--viewer-literal)
        }

        .json-summary {
            color: var(--muted-text)
        }

        .grid-wrap {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 8px 10px;
            background: var(--app-bg)
        }

        .grid-wrap {
            scrollbar-width: thin;
            scrollbar-color: var(--gray-4) var(--panel-alt-bg);
        }

        .grid-wrap::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .grid-wrap::-webkit-scrollbar-track {
            background: var(--panel-alt-bg);
            border-radius: 8px;
        }

        .grid-wrap::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--gray-4), var(--gray-5));
            border-radius: 8px;
            border: 2px solid var(--panel-alt-bg);
        }

        .grid-wrap::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--accent-blue), #2a79ee);
        }

        .simple-edit,
        .nested-edit {
            width: 100%;
            border: 1px solid transparent;
            background: transparent;
            outline: none;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            padding: 3px 5px;
            border-radius: 4px
        }

        .simple-edit:focus,
        .nested-edit:focus {
            border-color: var(--focus-border);
            background: var(--focus-bg)
        }

        .name-green {
            color: #0c8532;
            font-family: Segoe UI, Arial, sans-serif
        }

        .status {
            padding: 6px 10px;
            font-size: 12px;
            color: #4f4f4f;
            background: #fafafa;
            border-top: 1px solid var(--gray-2);
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center
        }

        .status .credit-inline {
            color: #7a7a7a
        }

        .empty {
            padding: 25px;
            color: var(--muted-text)
        }

        .viewer-host {
            min-width: max-content;
            color: var(--text-main)
        }

        .viewer-host table {
            margin: 2px 0;
            border-collapse: collapse;
            background: var(--viewer-bg)
        }

        .viewer-host td,
        .viewer-host th {
            padding: 2px 4px;
            vertical-align: baseline
        }

        .viewer-table {
            width: max-content;
            min-width: max-content
        }

        .viewer-table.object {
            border: 2px solid #444
        }

        .viewer-key,
        .viewer-member-header {
            color: var(--viewer-key);
            text-align: left;
            font-size: 12px;
        }

        .viewer-key,
        .viewer-element,
        .viewer-member,
        .viewer-value-cell {
            border: 1px solid var(--viewer-border)
        }

        .viewer-member-header {
            border: 1px solid var(--viewer-border);
            border-top: 2px solid var(--viewer-border);
            border-bottom: 2px solid var(--viewer-border);
            position: relative;
            min-width: 8ch;
            width: auto;
            background: var(--viewer-header-bg)
        }

        .viewer-index,
        .viewer-collapsed {
            white-space: nowrap
        }

        .viewer-index {
            border-right: 2px solid var(--viewer-border);
            min-width: 52px
        }

        .viewer-index::after,
        .viewer-badge {
            padding: 0 4px;
            display: inline-flex;
            align-items: center;
            line-height: 1.2;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: #fff
        }

        .viewer-index::after {
            margin-left: 2px
        }

        .viewer-collapsed {
            display: inline-flex;
            align-items: center;
            gap: 4px
        }

        .viewer-index.object::after {
            content: 'Obj';
            background: var(--viewer-object)
        }

        .viewer-index.array::after {
            content: 'Arr';
            background: var(--viewer-array)
        }

        .viewer-index.string::after {
            content: 'Str';
            background: var(--viewer-string)
        }

        .viewer-index.number::after {
            content: 'Num';
            background: var(--viewer-number)
        }

        .viewer-index.boolean::after,
        .viewer-index.null::after {
            background: var(--viewer-literal)
        }

        .viewer-index.boolean::after {
            content: 'Bool'
        }

        .viewer-index.null::after {
            content: 'Null'
        }

        .viewer-badge.object {
            background: var(--viewer-object)
        }

        .viewer-badge.array {
            background: var(--viewer-array)
        }

        .viewer-expand {
            display: inline-block;
            text-align: center;
            width: 1em;
            margin-left: 0;
            cursor: pointer;
            border: 1px solid var(--viewer-border);
            border-radius: 3px;
            user-select: none
        }

        .viewer-value.string,
        .viewer-edit.string {
            color: var(--viewer-string)
        }

        .viewer-value.number,
        .viewer-edit.number {
            color: var(--viewer-number)
        }

        .viewer-value.boolean,
        .viewer-edit.boolean,
        .viewer-value.null,
        .viewer-edit.null {
            color: var(--viewer-literal)
        }

        .viewer-edit {
            width: 100%;
            min-width: 80px;
            border: 1px solid transparent;
            background: transparent;
            outline: none;
            padding: 1px 2px;
            font-family: Consolas, monospace;
            font-size: 13px;
            color: var(--text-main)
        }

        .viewer-edit:focus {
            border-color: var(--focus-border);
            background: var(--focus-bg)
        }

        .viewer-element,
        .viewer-member,
        .viewer-value-cell {
            min-width: 8ch;
            width: auto;
            white-space: nowrap
        }

        .viewer-resizer {
            position: absolute;
            top: 0;
            right: -3px;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            user-select: none;
            z-index: 10
        }

        body.dark .app-credit {
            border-color: #6a6a6a;
            background: rgba(255, 255, 255, .08)
        }

        body.dark .divider {
            background: #2d2d30;
            border-left-color: #3c3c3c;
            border-right-color: #3c3c3c
        }

        body.dark .divider::before {
            background: #3c3c3c;
            color: #d4d4d4;
            border-color: #525252
        }

        body.dark .theme-switch {
            color: #d4d4d4
        }

        body.dark .theme-switch input {
            background: #2d2d30;
            border-color: #6b6b6b
        }

        body.dark .theme-switch input:checked {
            background: #4f8cff;
            border-color: #4f8cff
        }

        body.dark .viewer-index::after,
        body.dark .viewer-badge {
            color: #111
        }

        /* JSON field highlight style */
        .json-field-highlight {
            background-color: #ffeb99 !important;
            color: #000 !important;
            font-weight: bold;
        }

        body.dark .json-field-highlight {
            background-color: #b8860b !important;
            color: #fff !important;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="page-shell">
        <div class="app-titlebar">
            <div>
                <div class="app-title">JSON Grid Editor</div>
                <div class="app-subtitle">Editable nested JSON Grid • JSON and Grid stay in sync</div>
            </div>
            <div class="titlebar-right">
                <label class="theme-switch" for="themeToggleBtn">
                    <span>Dark</span>
                    <input id="themeToggleBtn" type="checkbox"  onchange="toggleTheme(this.checked ? 'dark' : 'light')"
                        aria-label="Toggle dark mode" />
                </label>
                <div class="app-credit">Developed by Thanga</div>
            </div>
        </div>

        <div class="workspace" id="workspace">
            <section class="panel">
                <div class="toolbar">
                    <div class="toolbar-title">JSON</div>
                    <button class="toolbtn gray" onclick="loadSample()">Sample</button>
                    <button class="toolbtn blue" onclick="focusSearch()">Search</button>
                    <button class="toolbtn magenta" onclick="formatJson()">Format</button>
                    <button class="toolbtn cyan" onclick="minifyJson()">Minify</button>
                    <button class="toolbtn green" onclick="validateJson()">Validate</button>
                    <button class="toolbtn yellow" onclick="clearJson()">Clear</button>
                    <div class="json-toolbar-group">
                    </div>
                </div>
                <div class="editor-wrap json-editor-wrapper">
                    <div class="json-scroll json-panel-view" id="jsonTextView">
                        <div class="gutter" id="gutter"></div>
                        <div class="json-highlighter" id="jsonHighlighter"></div>
                        <textarea id="jsonInput" class="json-area" spellcheck="false"
                            placeholder="Paste JSON here..."></textarea>
                    </div>
                    <div id="monacoEditor" class="json-monaco"></div>
                </div>

            </section>

            <div class="divider" id="divider" title="Drag to adjust width"></div>

            <section class="panel">
                <div class="toolbar">
                    <div class="toolbar-title">GRID</div>
                    <button class="toolbtn blue" onclick="searchGrid()">Search</button>
                    <button class="toolbtn blue" onclick="expandAll()">Expand All</button>
                    <button class="toolbtn blue" onclick="collapseAll()">Collapse All</button>
                    <div class="grid-toolbar-group">
                        <button class="toolbtn gray" onclick="toggleColumnsPanel()">Columns</button>
                        <div id="columnsPanel" class="columns-panel">
                            <div class="columns-panel-title">Select and reorder columns</div>
                            <input id="columnsSearchInput" class="columns-search" type="text" placeholder="Search columns..." oninput="setColumnsSearch(this.value)" />
                            <div class="columns-actions">
                                <button class="columns-action-btn" onclick="selectAllColumns()">Select All</button>
                                <button class="columns-action-btn" onclick="clearAllColumns()">Clear</button>
                            </div>
                            <div id="columnsList" class="columns-list"></div>
                            <div class="columns-footer-actions">
                                <button class="columns-action-btn" onclick="closeColumnsPanel(true)">Close</button>
                                <button class="columns-action-btn" onclick="applyColumnsPanelChanges()">Apply</button>
                            </div>
                            <div class="columns-panel-resize-handle" title="Drag to resize"></div>
                        </div>
                    </div>
                    <div class="right">
                        <button class="toolbtn red" onclick="downloadJson()">Download JSON</button>
                        <button class="toolbtn red2" onclick="downloadCsv()">Download CSV</button>
                    </div>
                </div>
                <div class="grid-wrap" id="gridWrap">
                    <div class="empty">Paste or edit JSON on the left. The grid updates automatically when the JSON is
                        valid.</div>
                </div>

            </section>
        </div>
    </div>

    <script>
        let rawData = [];
        let columns = [];
        let collapseState = {};
        let jsonCollapseState = {};
        let globalCollapsed = true;
        let parseTimer = null;
        let currentTheme = 'light';
        let jsonViewMode = 'text';
        let monacoEditor = null;
        let monacoModel = null;
        let isUsingMonaco = false;
        let selectedColumns = [];
        let columnOrder = [];
        let columnsPanelOpen = false;
        let draggedColumn = null;
        let columnsSearchTerm = '';
        let allowEmptyColumnSelection = false;
        let panelSelectedSnapshot = [];
        let panelOrderSnapshot = [];
        let columnsPanelHeight = 320;
        let isResizingPanel = false;

        const q = (id) => document.getElementById(id);
        const jsonInput = q('jsonInput');

        
        window.onload = function () {
            toggleTheme('dark');
            initColumnsPanelResize();
        };


        function getEditorValue() {
            return isUsingMonaco && monacoModel ? monacoModel.getValue() : jsonInput.value;
        }

        function setEditorValue(value) {
            const next = value == null ? '' : String(value);
            if (isUsingMonaco && monacoModel) {
                monacoModel.setValue(next);
                return;
            }
            jsonInput.value = next;
        }

        function focusEditor() {
            if (isUsingMonaco && monacoEditor) {
                monacoEditor.focus();
                return;
            }
            jsonInput.focus();
        }

        function triggerEditorSync() {
            syncGutter();
            syncJsonHighlighter();
            if (isUpdatingFromGrid) return;
            if (parseTimer) clearTimeout(parseTimer);
            parseTimer = setTimeout(() => { tryParseLive(); }, 300);
        }

        function ensureMonacoLoaded() {
            return new Promise((resolve, reject) => {
                if (window.monaco && window.monaco.editor) {
                    resolve(window.monaco);
                    return;
                }

                const existing = document.querySelector('script[data-monaco-loader="1"]');
                if (existing) {
                    const waitForMonaco = () => {
                        if (window.monaco && window.monaco.editor) {
                            resolve(window.monaco);
                        } else {
                            setTimeout(waitForMonaco, 50);
                        }
                    };
                    waitForMonaco();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js';
                script.async = true;
                script.dataset.monacoLoader = '1';
                script.onload = () => {
                    try {
                        window.MonacoEnvironment = {
                            getWorkerUrl: function (_moduleId, label) {
                                const workerBase = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/base/worker/workerMain.js';
                                const data = `self.MonacoEnvironment={baseUrl:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/'};importScripts('${workerBase}');`;
                                return `data:text/javascript;charset=utf-8,${encodeURIComponent(data)}`;
                            }
                        };

                        window.require.config({
                            paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' }
                        });
                        window.require(['vs/editor/editor.main'], () => resolve(window.monaco), reject);
                    } catch (e) {
                        reject(e);
                    }
                };
                script.onerror = () => reject(new Error('Failed to load Monaco loader'));
                document.head.appendChild(script);
            });
        }

        function applyMonacoTheme() {
            if (!window.monaco || !window.monaco.editor) return;
            window.monaco.editor.setTheme(currentTheme === 'dark' ? 'vs-dark' : 'vs');
        }

        function initMonacoEditor() {
            const monacoHost = q('monacoEditor');
            const textView = q('jsonTextView');
            if (!monacoHost || !textView) return;

            ensureMonacoLoaded().then((monaco) => {
                const initial = jsonInput.value || '';
                monacoModel = monaco.editor.createModel(initial, 'json');
                monacoEditor = monaco.editor.create(monacoHost, {
                    model: monacoModel,
                    automaticLayout: true,
                    minimap: { enabled: false },
                    tabSize: 2,
                    insertSpaces: true,
                    fontSize: 13,
                    lineHeight: 22,
                    fontFamily: 'Consolas, monospace',
                    roundedSelection: false,
                    smoothScrolling: true,
                    scrollBeyondLastLine: false,
                    wordWrap: 'off',
                    renderLineHighlight: 'all',
                    lineNumbersMinChars: 3,
                    folding: true,
                    formatOnPaste: true,
                    formatOnType: true,
                    glyphMargin: false,
                    suggestOnTriggerCharacters: true
                });

                applyMonacoTheme();

                monacoModel.onDidChangeContent(() => {
                    triggerEditorSync();
                });

                textView.style.display = 'none';
                monacoHost.style.display = 'block';
                isUsingMonaco = true;
                triggerEditorSync();
            }).catch((err) => {
                console.error('Monaco initialization failed:', err);
                setStatus('Monaco could not load. Using fallback editor.', 'Check internet/CDN access');
                isUsingMonaco = false;
            });
        }

        function applyTheme(theme) {
            currentTheme = theme === 'dark' ? 'dark' : 'light';
            document.body.classList.toggle('dark', currentTheme === 'dark');
            applyMonacoTheme();
            const themeBtn = q('themeToggleBtn');
            if (themeBtn) themeBtn.checked = currentTheme === 'dark';
            try {
                localStorage.setItem('jsonGridTheme', currentTheme);
            } catch (e) {
                void e;
            }
        }

        function toggleTheme(nextTheme) {
            if (nextTheme === 'dark' || nextTheme === 'light') {
                applyTheme(nextTheme);
                return;
            }
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        }

        function syncJsonHighlighter() {
            if (isUsingMonaco) return;
            const txt = getEditorValue();
            const highlighter = q('jsonHighlighter');
            if (!txt) {
                highlighter.innerHTML = '';
                return;
            }
            highlighter.innerHTML = highlightJson(txt);
            // Sync scroll position
            highlighter.scrollTop = jsonInput.scrollTop;
            highlighter.scrollLeft = jsonInput.scrollLeft;
        }

        function highlightJson(text) {
            let i = 0;
            const len = text.length;
            let out = '';
            const stack = [];

            const add = (content, cls) => {
                if (!content) return;
                const safe = escapeHtml(content);
                out += cls ? `<span class="${cls}">${safe}</span>` : safe;
            };

            const top = () => stack[stack.length - 1];

            while (i < len) {
                const ch = text[i];

                if (/\s/.test(ch)) {
                    let j = i + 1;
                    while (j < len && /\s/.test(text[j])) j++;
                    add(text.slice(i, j));
                    i = j;
                    continue;
                }

                if (ch === '"') {
                    let j = i + 1;
                    let escaped = false;
                    while (j < len) {
                        const c = text[j];
                        if (escaped) {
                            escaped = false;
                        } else if (c === '\\') {
                            escaped = true;
                        } else if (c === '"') {
                            j++;
                            break;
                        }
                        j++;
                    }

                    const token = text.slice(i, j);
                    let k = j;
                    while (k < len && /\s/.test(text[k])) k++;
                    const asKey = top() && top().type === 'object' && top().expectingKey && text[k] === ':';
                    add(token, asKey ? 'json-key' : 'json-string');
                    if (asKey) top().expectingKey = false;
                    i = j;
                    continue;
                }

                if (ch === '{' || ch === '[' || ch === '}' || ch === ']' || ch === ':' || ch === ',') {
                    add(ch, 'json-punc');
                    if (ch === '{') {
                        stack.push({ type: 'object', expectingKey: true });
                    } else if (ch === '[') {
                        stack.push({ type: 'array' });
                    } else if (ch === '}') {
                        if (top() && top().type === 'object') stack.pop();
                    } else if (ch === ']') {
                        if (top() && top().type === 'array') stack.pop();
                    } else if (ch === ',') {
                        if (top() && top().type === 'object') top().expectingKey = true;
                    }
                    i++;
                    continue;
                }

                if (ch === '-' || /\d/.test(ch)) {
                    let j = i;
                    if (text[j] === '-') j++;
                    if (text[j] === '0') {
                        j++;
                    } else {
                        while (j < len && /\d/.test(text[j])) j++;
                    }
                    if (text[j] === '.') {
                        j++;
                        while (j < len && /\d/.test(text[j])) j++;
                    }
                    if (text[j] === 'e' || text[j] === 'E') {
                        j++;
                        if (text[j] === '+' || text[j] === '-') j++;
                        while (j < len && /\d/.test(text[j])) j++;
                    }
                    add(text.slice(i, j), 'json-number');
                    i = j;
                    continue;
                }

                if (text.startsWith('true', i)) {
                    add('true', 'json-boolean');
                    i += 4;
                    continue;
                }
                if (text.startsWith('false', i)) {
                    add('false', 'json-boolean');
                    i += 5;
                    continue;
                }
                if (text.startsWith('null', i)) {
                    add('null', 'json-null');
                    i += 4;
                    continue;
                }

                let j = i + 1;
                while (j < len && !/[\s\{\}\[\]",:]/.test(text[j])) j++;
                add(text.slice(i, j), 'json-error');
                i = j;
            }

            return out;
        }

        function replaceSelection(newText) {
            if (isUsingMonaco && monacoEditor) {
                const selection = monacoEditor.getSelection();
                monacoEditor.executeEdits('json-replace', [{ range: selection, text: newText, forceMoveMarkers: true }]);
                return;
            }
            const start = jsonInput.selectionStart;
            const end = jsonInput.selectionEnd;
            jsonInput.setRangeText(newText, start, end, 'end');
            syncGutter();
            syncJsonHighlighter();
            if (isUpdatingFromGrid) return;
            if (parseTimer) clearTimeout(parseTimer);
            parseTimer = setTimeout(() => { tryParseLive(); }, 300);
        }

        function handleJsonEditorKeys(e) {
            if (isUsingMonaco) return;
            if (!e.ctrlKey && !e.metaKey && !e.altKey) {
                const pairs = { '"': '"', '{': '}', '[': ']' };
                if (pairs[e.key]) {
                    const start = jsonInput.selectionStart;
                    const end = jsonInput.selectionEnd;
                    const selected = jsonInput.value.slice(start, end);
                    if (selected) {
                        e.preventDefault();
                        replaceSelection(`${e.key}${selected}${pairs[e.key]}`);
                        jsonInput.setSelectionRange(start + 1, end + 1);
                        return;
                    }
                    if (e.key !== '"') {
                        e.preventDefault();
                        replaceSelection(`${e.key}${pairs[e.key]}`);
                        jsonInput.setSelectionRange(start + 1, start + 1);
                        return;
                    }
                }

                if ((e.key === '}' || e.key === ']' || e.key === '"') && jsonInput.selectionStart === jsonInput.selectionEnd) {
                    const pos = jsonInput.selectionStart;
                    if (jsonInput.value[pos] === e.key) {
                        e.preventDefault();
                        jsonInput.setSelectionRange(pos + 1, pos + 1);
                        return;
                    }
                }
            }

            if (e.key === 'Tab') {
                e.preventDefault();
                const start = jsonInput.selectionStart;
                const end = jsonInput.selectionEnd;
                const value = jsonInput.value;

                if (start !== end && value.slice(start, end).includes('\n')) {
                    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
                    const selected = value.slice(lineStart, end);
                    const updated = e.shiftKey
                        ? selected.replace(/^ {1,2}/gm, '')
                        : selected.replace(/^/gm, '  ');
                    jsonInput.setRangeText(updated, lineStart, end, 'select');
                } else {
                    jsonInput.setRangeText(e.shiftKey ? '' : '  ', start, end, 'end');
                }

                syncGutter();
                syncJsonHighlighter();
                if (!isUpdatingFromGrid) {
                    if (parseTimer) clearTimeout(parseTimer);
                    parseTimer = setTimeout(() => { tryParseLive(); }, 300);
                }
                return;
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                const start = jsonInput.selectionStart;
                const value = jsonInput.value;
                const lineStart = value.lastIndexOf('\n', start - 1) + 1;
                const prefix = value.slice(lineStart, start);
                const indent = (prefix.match(/^\s*/) || [''])[0];
                const prevChar = value.slice(0, start).trimEnd().slice(-1);
                const nextChar = value.slice(start).trimStart().charAt(0);
                const extraIndent = prevChar === '{' || prevChar === '[' ? '  ' : '';
                const closingBlock = (prevChar === '{' && nextChar === '}') || (prevChar === '[' && nextChar === ']');
                const insert = closingBlock
                    ? `\n${indent}${extraIndent}\n${indent}`
                    : `\n${indent}${extraIndent}`;
                replaceSelection(insert);
            }
        }

        function setStatus(left, right) {
            const leftEl = q('statusLeft');
            const rightEl = q('statusRight');
            if (left !== undefined && leftEl && leftEl.children[0]) leftEl.children[0].textContent = left;
            if (right !== undefined && rightEl && rightEl.children[0]) rightEl.children[0].textContent = right;
        }

        function syncGutter() {
            if (isUsingMonaco) return;
            const ta = jsonInput;
            const gutter = q('gutter');
            const lines = Math.max(1, ta.value.split('\n').length);
            let html = '';
            for (let i = 1; i <= lines; i++) html += `<div class="line">${i}</div>`;
            gutter.innerHTML = html;
            gutter.scrollTop = ta.scrollTop;
        }
        jsonInput.addEventListener('scroll', () => {
            if (isUsingMonaco) return;
            q('gutter').scrollTop = jsonInput.scrollTop;
            q('jsonHighlighter').scrollTop = jsonInput.scrollTop;
            q('jsonHighlighter').scrollLeft = jsonInput.scrollLeft;
        });
        jsonInput.addEventListener('input', () => {
            if (isUsingMonaco) return;
            syncGutter();
            syncJsonHighlighter();
            if (isUpdatingFromGrid) return;
            if (parseTimer) clearTimeout(parseTimer);
            parseTimer = setTimeout(() => { tryParseLive(); }, 300);
        });
        jsonInput.addEventListener('keydown', handleJsonEditorKeys);

        function jsonNodeExpanded(path, rootExpanded = false) {
            if (rootExpanded) return true;
            return !(jsonCollapseState[path] ?? true);
        }

        function toggleJsonNode(path) {
            jsonCollapseState[path] = !(jsonCollapseState[path] ?? true);
            renderJsonTree();
        }

        function expandJsonAll() {
            jsonCollapseState = {};
            renderJsonTree(true);
        }

        function collapseJsonAll() {
            jsonCollapseState = {};
            renderJsonTree(false);
        }

        function jsonIndent(depth) {
            return '<span class="json-indent"></span>'.repeat(depth);
        }

        function renderJsonPrimitive(value) {
            const type = valueType(value);
            if (type === 'string') return `<span class="json-string">"${escapeHtml(String(value))}"</span>`;
            if (type === 'number') return `<span class="json-number">${escapeHtml(String(value))}</span>`;
            if (type === 'boolean') return `<span class="json-boolean">${String(value)}</span>`;
            if (type === 'null') return '<span class="json-null">null</span>';
            return `<span>${escapeHtml(String(value))}</span>`;
        }

        function renderJsonTreeNode(value, path, depth, keyName, isLast, rootExpanded = false) {
            const indent = jsonIndent(depth);
            const keyHtml = keyName !== undefined ? `<span class="json-key">"${escapeHtml(String(keyName))}"</span><span class="json-punc">: </span>` : '';

            if (Array.isArray(value)) {
                const expanded = jsonNodeExpanded(path, rootExpanded);
                let html = `<div class="json-tree-line">${indent}<span class="json-toggle" onclick="toggleJsonNode('${esc(path)}')">${expanded ? '-' : '+'}</span>${keyHtml}<span class="json-punc">[</span>${expanded ? '' : `<span class="json-summary">Array(${value.length})</span>`}<span class="json-punc">${expanded ? '' : ']'}${isLast ? ',' : ''}</span></div>`;
                if (expanded) {
                    value.forEach((item, index) => {
                        html += renderJsonTreeNode(item, `${path}.${index}`, depth + 1, undefined, index < value.length - 1);
                    });
                    html += `<div class="json-tree-line">${indent}<span class="json-toggle-spacer"></span><span class="json-punc">]${isLast ? ',' : ''}</span></div>`;
                }
                return html;
            }

            if (isObject(value)) {
                const entries = Object.entries(value);
                const expanded = jsonNodeExpanded(path, rootExpanded);
                let html = `<div class="json-tree-line">${indent}<span class="json-toggle" onclick="toggleJsonNode('${esc(path)}')">${expanded ? '-' : '+'}</span>${keyHtml}<span class="json-punc">{</span>${expanded ? '' : `<span class="json-summary">Object(${entries.length})</span>`}<span class="json-punc">${expanded ? '' : '}'}${isLast ? ',' : ''}</span></div>`;
                if (expanded) {
                    entries.forEach(([childKey, childValue], index) => {
                        html += renderJsonTreeNode(childValue, `${path}.${childKey}`, depth + 1, childKey, index < entries.length - 1);
                    });
                    html += `<div class="json-tree-line">${indent}<span class="json-toggle-spacer"></span><span class="json-punc">}${isLast ? ',' : ''}</span></div>`;
                }
                return html;
            }

            return `<div class="json-tree-line">${indent}<span class="json-toggle-spacer"></span>${keyHtml}${renderJsonPrimitive(value)}<span class="json-punc">${isLast ? ',' : ''}</span></div>`;
        }

        function renderJsonTree() {
            // Tree view rendering - kept for compatibility but no longer used in UI
        }

        function sampleData() {
            return [
                { "id": 1, "name": "John", "address": [{ "type": "home", "city": "Chennai", "pincode": 600001 }, { "type": "office", "city": "Chennai", "pincode": 600032 }], "skills": ["Power Apps", "Power Automate"], "manager": { "name": "Rajesh", "location": { "country": "India", "state": "Tamil Nadu" } } }, 
                { "id": 2, "name": "Sarah", "address": [{ "type": "home", "city": "Bangalore", "pincode": 560001 }, { "type": "office", "city": "Bangalore", "pincode": 560103 }], "skills": ["Power BI"], "manager": { "name": "Gopi", "location": { "country": "India", "state": "Tamil Nadu" } } }
            ];
        }

        function loadSample() {
            rawData = sampleData();
            globalCollapsed = true;
            collapseState = {};
            jsonCollapseState = {};
            columns = collectColumns(rawData);
            syncColumnSelection(columns);
            if (columnsPanelOpen) renderColumnsPanel();
            syncJsonFromGrid(true);
            setStatus('Sample JSON loaded', 'Editable grid ready');
        }

        function clearJson() {
            setEditorValue('');
            syncGutter();
            syncJsonHighlighter();
            rawData = []; columns = [];
            selectedColumns = [];
            collapseState = {};
            jsonCollapseState = {};
            globalCollapsed = true;
            if (columnsPanelOpen) renderColumnsPanel();
            renderGrid();
            setStatus('Cleared', 'No data loaded');
        }

        function focusSearch() {
            const txt = prompt('Search text in JSON:');
            if (!txt) return;
            const editorText = getEditorValue();
            const idx = editorText.toLowerCase().indexOf(txt.toLowerCase());
            if (idx < 0) { setStatus('Text not found'); return; }
            if (isUsingMonaco && monacoEditor) {
                const startPos = monacoModel.getPositionAt(idx);
                const endPos = monacoModel.getPositionAt(idx + txt.length);
                monacoEditor.setSelection({
                    startLineNumber: startPos.lineNumber,
                    startColumn: startPos.column,
                    endLineNumber: endPos.lineNumber,
                    endColumn: endPos.column
                });
                monacoEditor.revealLineInCenter(startPos.lineNumber);
                monacoEditor.focus();
            } else {
                jsonInput.focus();
                jsonInput.setSelectionRange(idx, idx + txt.length);
            }
            setStatus('Search match selected');
        }

        function tryParseLive() {
            const txt = getEditorValue().trim();
            if (!txt) {
                rawData = [];
                columns = [];
                selectedColumns = [];
                collapseState = {};
                jsonCollapseState = {};
                globalCollapsed = true;
                if (columnsPanelOpen) renderColumnsPanel();
                renderGrid();
                syncJsonHighlighter();
                setStatus('JSON input empty', 'No data loaded');
                return;
            }
            try {
                const parsed = JSON.parse(txt);
                rawData = deepClone(parsed);
                columns = collectColumns(rawData);
                syncColumnSelection(columns);
                collapseState = {};
                jsonCollapseState = {};
                globalCollapsed = true;
                if (columnsPanelOpen) renderColumnsPanel();
                renderGrid();
                syncJsonHighlighter();
                setStatus('JSON synced from input', Array.isArray(rawData) ? `${rawData.length} item(s)` : 'Object loaded');
            } catch (e) {
                syncJsonHighlighter();
                setStatus('JSON editing...', 'Waiting for valid JSON');
            }
        }

        function formatJson() {
            try {
                const parsed = JSON.parse(getEditorValue() || '[]');
                setEditorValue(JSON.stringify(parsed, null, 2));
                syncGutter();
                syncJsonHighlighter();
                tryParseLive();
                setStatus('JSON formatted successfully');
            } catch (e) { setStatus('Invalid JSON: ' + e.message, 'Validation failed'); }
        }

        function minifyJson() {
            try {
                const parsed = JSON.parse(getEditorValue() || '[]');
                setEditorValue(JSON.stringify(parsed));
                syncGutter();
                syncJsonHighlighter();
                tryParseLive();
                setStatus('JSON minified successfully');
            } catch (e) { setStatus('Invalid JSON: ' + e.message, 'Validation failed'); }
        }

        function validateJson() {
            try {
                JSON.parse(getEditorValue() || '[]');
                tryParseLive();
                setStatus('Valid JSON', 'Grid updated');
            } catch (e) { setStatus('Invalid JSON: ' + e.message, 'Validation failed'); }
        }


        function searchGrid() {
            const term = prompt('Search value in grid:');
            if (!term) return;
            const cells = [...document.querySelectorAll('[data-searchable="1"]')];
            let found = 0;
            cells.forEach(c => {
                const val = ('value' in c ? c.value : c.textContent) || '';
                const hit = val.toLowerCase().includes(term.toLowerCase());
                c.style.outline = hit ? '2px solid #0aa34a' : 'none';
                if (hit) found++;
            });
            setStatus(undefined, found ? `${found} matching field(s) highlighted` : 'No matches found');
        }

        function syncColumnSelection(nextColumns) {
            const incoming = Array.isArray(nextColumns) ? nextColumns.slice() : [];
            const prevSelected = selectedColumns.slice();
            const prevOrder = columnOrder.slice();

            columnOrder = prevOrder.filter(col => incoming.includes(col));
            incoming.forEach(col => {
                if (!columnOrder.includes(col)) columnOrder.push(col);
            });

            selectedColumns = prevSelected.filter(col => incoming.includes(col));

            if (!selectedColumns.length && incoming.length && !allowEmptyColumnSelection) {
                selectedColumns = columnOrder.slice();
            }
        }

        function visibleColumns(allHeaders) {
            const headers = Array.isArray(allHeaders) ? allHeaders : [];
            return columnOrder.filter(col => headers.includes(col) && selectedColumns.includes(col));
        }

        function initColumnsPanelResize() {
            const handle = document.querySelector('.columns-panel-resize-handle');
            if (!handle) return;
            
            handle.addEventListener('mousedown', (e) => {
                isResizingPanel = true;
                const startY = e.clientY;
                const panel = q('columnsPanel');
                const startHeight = columnsPanelHeight;
                
                const onMouseMove = (moveEvent) => {
                    if (!isResizingPanel) return;
                    const deltaY = moveEvent.clientY - startY;
                    const newHeight = Math.max(150, Math.min(500, startHeight + deltaY));
                    columnsPanelHeight = newHeight;
                    if (panel) {
                        panel.style.maxHeight = newHeight + 'px';
                    }
                };
                
                const onMouseUp = () => {
                    isResizingPanel = false;
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    localStorage.setItem('columnsPanelHeight', columnsPanelHeight);
                };
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
            
            // Load saved height from localStorage
            const savedHeight = localStorage.getItem('columnsPanelHeight');
            if (savedHeight) {
                columnsPanelHeight = Math.max(150, Math.min(500, parseInt(savedHeight, 10)));
                const panel = q('columnsPanel');
                if (panel) {
                    panel.style.maxHeight = columnsPanelHeight + 'px';
                }
            }
        }

        function toggleColumnsPanel(force) {
            const panel = q('columnsPanel');
            if (!panel) return;
            const nextOpen = typeof force === 'boolean' ? force : !columnsPanelOpen;
            if (!nextOpen && columnsPanelOpen) {
                closeColumnsPanel(true);
                return;
            }
            columnsPanelOpen = nextOpen;
            panel.classList.toggle('open', columnsPanelOpen);
            if (columnsPanelOpen) {
                panelSelectedSnapshot = selectedColumns.slice();
                panelOrderSnapshot = columnOrder.slice();
                const input = q('columnsSearchInput');
                if (input) {
                    input.value = columnsSearchTerm;
                    setTimeout(() => input.focus(), 0);
                }
                renderColumnsPanel();
            }
        }

        function closeColumnsPanel(discardChanges = true) {
            const panel = q('columnsPanel');
            if (!panel) return;
            if (discardChanges) {
                selectedColumns = panelSelectedSnapshot.slice();
                columnOrder = panelOrderSnapshot.slice();
            }
            columnsPanelOpen = false;
            panel.classList.remove('open');
        }

        function applyColumnsPanelChanges() {
            allowEmptyColumnSelection = selectedColumns.length === 0;
            panelSelectedSnapshot = selectedColumns.slice();
            panelOrderSnapshot = columnOrder.slice();
            closeColumnsPanel(false);
            renderGrid();
            setStatus(undefined, 'Column selection applied');
        }

        function setColumnsSearch(term) {
            columnsSearchTerm = String(term || '').trim().toLowerCase();
            renderColumnsPanel();
        }

        function clearDropIndicators() {
            document.querySelectorAll('.column-item.drop-before, .column-item.drop-after').forEach(el => {
                el.classList.remove('drop-before', 'drop-after');
            });
        }

        function renderColumnsPanel() {
            const list = q('columnsList');
            if (!list) return;
            list.innerHTML = '';

            if (!columns.length) {
                list.innerHTML = '<div class="column-name">No columns available</div>';
                return;
            }

            const matchesSearch = (col) => !columnsSearchTerm || String(col).toLowerCase().includes(columnsSearchTerm);

            columnOrder.filter(matchesSearch).forEach(col => {
                const item = document.createElement('div');
                item.className = 'column-item';
                item.draggable = true;
                item.dataset.column = col;
                item.style.position = 'relative';

                item.addEventListener('dragstart', (e) => {
                    draggedColumn = col;
                    item.classList.add('dragging');
                    if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
                });
                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    clearDropIndicators();
                    draggedColumn = null;
                });
                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    clearDropIndicators();
                    const rect = item.getBoundingClientRect();
                    const midpoint = rect.top + rect.height / 2;
                    if (e.clientY < midpoint) {
                        item.classList.add('drop-before');
                    } else {
                        item.classList.add('drop-after');
                    }
                });
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const target = item.dataset.column;
                    if (!draggedColumn || draggedColumn === target) return;
                    clearDropIndicators();
                    moveSelectedColumn(draggedColumn, target);
                });

                const drag = document.createElement('span');
                drag.className = 'column-drag';
                drag.textContent = '::';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = selectedColumns.includes(col);
                checkbox.addEventListener('click', (e) => e.stopPropagation());
                checkbox.addEventListener('mousedown', (e) => e.stopPropagation());
                checkbox.addEventListener('change', () => {
                    if (checkbox.checked) {
                        if (!selectedColumns.includes(col)) selectedColumns.push(col);
                    } else {
                        selectedColumns = selectedColumns.filter(c => c !== col);
                    }
                    renderColumnsPanel();
                });

                const name = document.createElement('span');
                name.className = 'column-name';
                name.textContent = col;

                item.appendChild(drag);
                item.appendChild(checkbox);
                item.appendChild(name);
                list.appendChild(item);
            });

            if (!list.children.length) {
                list.innerHTML = '<div class="column-name">No matching columns</div>';
            }
        }

        function moveSelectedColumn(sourceCol, targetCol) {
            const fromIdx = columnOrder.indexOf(sourceCol);
            const toIdx = columnOrder.indexOf(targetCol);
            if (fromIdx < 0 || toIdx < 0) return;
            const next = columnOrder.slice();
            next.splice(fromIdx, 1);
            next.splice(toIdx, 0, sourceCol);
            columnOrder = next;
            renderColumnsPanel();
        }

        function selectAllColumns() {
            selectedColumns = columnOrder.slice();
            allowEmptyColumnSelection = false;
            renderColumnsPanel();
        }

        function clearAllColumns() {
            selectedColumns = [];
            allowEmptyColumnSelection = true;
            renderColumnsPanel();
        }

        function expandAll() { globalCollapsed = false; collapseState = {}; renderGrid(); setStatus(undefined, 'All nested values expanded'); }
        function collapseAll() { globalCollapsed = true; renderGrid(); setStatus(undefined, 'All nested values collapsed'); }

        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
        function collectColumns(rows) {
            const set = new Set();
            if (Array.isArray(rows)) {
                rows.forEach(r => {
                    if (r && typeof r === 'object' && !Array.isArray(r)) Object.keys(r).forEach(k => set.add(k));
                    else set.add('value');
                });
            } else if (rows && typeof rows === 'object') {
                Object.keys(rows).forEach(k => set.add(k));
            }
            return [...set];
        }
        function isObject(v) { return v && typeof v === 'object' && !Array.isArray(v); }
        function valueType(v) {
            return Array.isArray(v) ? 'array' : v === null ? 'null' : typeof v;
        }
        function isExpanded(path, rootExpanded = false) {
            if (rootExpanded) return true;
            return !(collapseState[path] ?? globalCollapsed);
        }

        function primitiveEditor(path, value, extra = '') {
            const safe = value === undefined || value === null ? '' : escapeAttr(String(value));
            const type = valueType(value);
            return `<input class="viewer-edit ${type} ${extra}" data-searchable="1" value="${safe}" oninput="updatePathValue('${esc(path)}', this.value)" onchange="updatePathValue('${esc(path)}', this.value)" />`;
        }
        function nestedPrimitiveEditor(path, value) {
            return primitiveEditor(path, value);
        }

        function getArrayHeaders(arr) {
            return arr.reduce((headers, element) => {
                if (isObject(element)) return [...new Set([...headers, ...Object.keys(element)])];
                return headers;
            }, []);
        }

        function displayCellText(value) {
            if (value === undefined || value === null) return '';
            if (Array.isArray(value)) return `Array[${value.length}]`;
            if (isObject(value)) return `Object[${Object.keys(value).length}]`;
            return String(value);
        }

        function getArrayColumnWidths(arr, headers) {
            const widths = {};
            headers.forEach(header => {
                let maxLen = String(header).length;
                for (const row of arr) {
                    const val = isObject(row) ? row[header] : undefined;
                    const len = displayCellText(val).length;
                    if (len > maxLen) maxLen = len;
                }
                // Add small breathing space and keep sane minimum.
                widths[header] = Math.max(8, maxLen + 2);
            });
            return widths;
        }

        function renderCollapsed(kind, count, path) {
            return `<span class="viewer-collapsed"><span class="viewer-badge ${kind}">${kind === 'array' ? `Array[${count}]` : `Object[${count}]`}</span><span class="viewer-expand" onclick="toggleNode('${esc(path)}')">+</span></span>`;
        }

        function renderObjectTable(member, path) {
            const rows = Object.entries(member).map(([key, val]) => {
                const childPath = path ? `${path}.${key}` : key;
                return `<tr class="object member"><th class="viewer-key">${escapeHtml(key)}</th><td class="viewer-element">${renderCell(val, childPath)}</td></tr>`;
            }).join('');
            return `<table class="viewer-table object"><tbody>${rows}</tbody></table>`;
        }

        function renderArrayRow(element, index, headers, path, columnWidths) {
            const type = valueType(element);
            const rowPath = path ? `${path}.${index}` : String(index);

            if (isObject(element)) {
                const cells = headers.map(header => {
                    const childPath = `${rowPath}.${header}`;
                    const colWidth = columnWidths[header] || Math.max(8, String(header).length + 2);
                    return `<td class="viewer-member" style="min-width:${colWidth}ch;width:${colWidth}ch">${renderCell(element[header], childPath)}</td>`;
                }).join('');
                return `<tr class="array-el ${type}"><td class="viewer-index ${type}">${index}</td>${cells}</tr>`;
            }

            return `<tr class="array-el ${type}"><td class="viewer-index ${type}">${index}</td><td class="viewer-value-cell" colspan="${Math.max(headers.length, 1)}">${renderCell(element, rowPath)}</td></tr>`;
        }

        function renderArrayTable(arr, path) {
            const allHeaders = getArrayHeaders(arr);
            const headers = visibleColumns(allHeaders);
            const columnWidths = getArrayColumnWidths(arr, headers);
            const headerCells = headers.map(header => {
                const colWidth = columnWidths[header] || Math.max(8, String(header).length + 2);
                return `<th class="viewer-member-header" data-resizable="1" style="min-width:${colWidth}ch;width:${colWidth}ch">${escapeHtml(header)}<div class="viewer-resizer"></div></th>`;
            }).join('');
            const head = headers.length
                ? `<thead><tr><th class="viewer-member-header" style="min-width:42px;width:42px"></th>${headerCells}</tr></thead>`
                : '';
            const body = arr.map((item, index) => renderArrayRow(item, index, headers, path, columnWidths)).join('');
            return `<table class="viewer-table array">${head}<tbody>${body}</tbody></table>`;
        }

        function renderCell(value, path, rootExpanded = false) {
            if (Array.isArray(value)) {
                const expanded = isExpanded(path, rootExpanded);
                return `${expanded ? `<span class="viewer-collapsed"><span class="viewer-badge array">Array[${value.length}]</span><span class="viewer-expand" onclick="toggleNode('${esc(path)}')">-</span></span>${renderArrayTable(value, path)}` : renderCollapsed('array', value.length, path)}`;
            }

            if (isObject(value)) {
                const expanded = isExpanded(path, rootExpanded);
                const count = Object.keys(value).length;
                return `${expanded ? `<span class="viewer-collapsed"><span class="viewer-badge object">Object[${count}]</span><span class="viewer-expand" onclick="toggleNode('${esc(path)}')">-</span></span>${renderObjectTable(value, path)}` : renderCollapsed('object', count, path)}`;
            }

            return primitiveEditor(path, value);
        }

        function toggleNode(path) {
            collapseState[path] = !(collapseState[path] ?? globalCollapsed);
            renderGrid();
        }

        function renderGrid() {
            const wrap = q('gridWrap');
            if (rawData === undefined || rawData === null || rawData === '') {
                wrap.innerHTML = '<div class="empty">Paste or edit valid JSON on the left. The grid will sync automatically.</div>';
                return;
            }
            if (Array.isArray(rawData) && rawData.length === 0) {
                wrap.innerHTML = '<div class="empty">Paste or edit valid JSON on the left. The grid will sync automatically.</div>';
                return;
            }
            columns = collectColumns(rawData);
            syncColumnSelection(columns);
            if (columnsPanelOpen) renderColumnsPanel();
            wrap.innerHTML = `<div class="viewer-host">${renderCell(rawData, 'root', true)}</div>`;
            initResizableTables();
        }

        function initResizableTables() {
            const resizers = [...q('gridWrap').querySelectorAll('.viewer-resizer')];
            resizers.forEach(resizer => {
                resizer.onmousedown = (event) => {
                    event.preventDefault();
                    const th = resizer.parentElement;
                    const table = th.closest('table');
                    const startX = event.pageX;
                    const startWidth = parseInt(window.getComputedStyle(th).width, 10);
                    const columnIndex = th.cellIndex + 1;

                    const setSize = (moveEvent) => {
                        const movedX = moveEvent.pageX - startX;
                        const width = Math.max(80, startWidth + movedX) + 'px';
                        th.style.width = width;
                        th.style.minWidth = width;
                        table.querySelectorAll(`tbody tr td:nth-child(${columnIndex}), tbody tr th:nth-child(${columnIndex})`).forEach(cell => {
                            cell.style.width = width;
                            cell.style.minWidth = width;
                        });
                    };

                    const cleanup = () => {
                        document.removeEventListener('mousemove', setSize);
                        document.removeEventListener('mouseup', cleanup);
                    };

                    document.addEventListener('mousemove', setSize);
                    document.addEventListener('mouseup', cleanup);
                };
                resizer.ondblclick = () => {
                    const th = resizer.parentElement;
                    const table = th.closest('table');
                    const columnIndex = th.cellIndex + 1;
                    th.style.width = '';
                    th.style.minWidth = '';
                    table.querySelectorAll(`tbody tr td:nth-child(${columnIndex}), tbody tr th:nth-child(${columnIndex})`).forEach(cell => {
                        cell.style.width = '';
                        cell.style.minWidth = '';
                    });
                };
            });
        }

        function splitPath(path) {
            if (!path || path === 'root') return [];
            return path
                .split('.')
                .filter(Boolean)
                .filter((p, idx) => !(idx === 0 && p === 'root'))
                .map(p => /^\d+$/.test(p) ? Number(p) : p);
        }
        function getPathValue(obj, pathArr) { let cur = obj; for (const p of pathArr) { if (cur == null) return undefined; cur = cur[p]; } return cur; }
        function setPathValue(target, pathArr, value) {
            if (!pathArr.length) return value;
            let cur = target;
            for (let i = 0; i < pathArr.length - 1; i++) {
                const key = pathArr[i];
                const next = pathArr[i + 1];
                if (cur[key] === undefined || cur[key] === null) cur[key] = typeof next === 'number' ? [] : {};
                cur = cur[key];
            }
            cur[pathArr[pathArr.length - 1]] = value;
            return target;
        }
        function parseByExistingType(val, current) {
            if (val === 'null') return null;
            if (val === 'true') return true;
            if (val === 'false') return false;
            if (typeof current === 'number') return val === '' ? null : Number(val);
            if (typeof current === 'boolean') return val.toLowerCase() === 'true';
            if (current === null && val !== '' && !isNaN(Number(val))) return Number(val);
            if (val !== '' && !isNaN(Number(val)) && typeof current !== 'string') return Number(val);
            return val;
        }

        let isUpdatingFromGrid = false;

        let jsonHighlightDecorations = [];

        function findJsonRangeByPath(json, targetPath) {
            let i = 0;
            let result = null;

            function skipWs() {
                while (i < json.length && /\s/.test(json[i])) i++;
            }

            function parseStringToken() {
                const start = i;
                i++; // opening quote
                let escaped = false;
                while (i < json.length) {
                    const ch = json[i++];
                    if (escaped) {
                        escaped = false;
                        continue;
                    }
                    if (ch === '\\') {
                        escaped = true;
                        continue;
                    }
                    if (ch === '"') break;
                }
                const end = i;
                return { start, end, value: JSON.parse(json.slice(start, end)) };
            }

            function isExactPath(path) {
                if (path.length !== targetPath.length) return false;
                for (let idx = 0; idx < path.length; idx++) {
                    if (path[idx] !== targetPath[idx]) return false;
                }
                return true;
            }

            function parsePrimitive() {
                const start = i;
                while (i < json.length && !/[\s,\]\}]/.test(json[i])) i++;
                return { start, end: i };
            }

            function parseValue(path) {
                skipWs();
                const ch = json[i];
                if (ch === '{') return parseObject(path);
                if (ch === '[') return parseArray(path);
                if (ch === '"') {
                    const tok = parseStringToken();
                    return { start: tok.start, end: tok.end };
                }
                return parsePrimitive();
            }

            function parseObject(path) {
                const objStart = i;
                i++; // {
                skipWs();

                if (json[i] === '}') {
                    i++;
                    return { start: objStart, end: i };
                }

                while (i < json.length) {
                    skipWs();
                    const keyTok = parseStringToken();
                    const key = keyTok.value;
                    skipWs();
                    if (json[i] === ':') i++;
