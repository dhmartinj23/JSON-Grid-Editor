                    skipWs();

                    const childPath = path.concat(key);
                    const valueRange = parseValue(childPath);

                    if (!result && isExactPath(childPath)) {
                        // Highlight full key-value pair for object members.
                        result = { start: keyTok.start, end: valueRange.end };
                    }

                    skipWs();
                    if (json[i] === ',') {
                        i++;
                        continue;
                    }
                    if (json[i] === '}') {
                        i++;
                        break;
                    }
                }

                return { start: objStart, end: i };
            }

            function parseArray(path) {
                const arrStart = i;
                i++; // [
                skipWs();

                if (json[i] === ']') {
                    i++;
                    return { start: arrStart, end: i };
                }

                let index = 0;
                while (i < json.length) {
                    const childPath = path.concat(index);
                    const valueStart = i;
                    const valueRange = parseValue(childPath);

                    if (!result && isExactPath(childPath)) {
                        // For arrays, highlight just the element value.
                        result = { start: valueStart, end: valueRange.end };
                    }

                    skipWs();
                    if (json[i] === ',') {
                        i++;
                        index++;
                        continue;
                    }
                    if (json[i] === ']') {
                        i++;
                        break;
                    }
                }

                return { start: arrStart, end: i };
            }

            parseValue([]);
            return result;
        }

        function highlightJsonPath(pathStr) {
            if (!pathStr || pathStr === 'root') return;
            const json = getEditorValue();
            if (!json) return;

            const pathArr = splitPath(pathStr);
            if (!pathArr.length) return;

            try {
                const range = findJsonRangeByPath(json, pathArr);
                if (!range || range.start < 0 || range.end <= range.start) return;

                if (isUsingMonaco && monacoEditor && monacoModel) {
                    if (jsonHighlightDecorations.length > 0) {
                        jsonHighlightDecorations = monacoEditor.deltaDecorations(jsonHighlightDecorations, []);
                    }

                    const startPos = monacoModel.getPositionAt(range.start);
                    const endPos = monacoModel.getPositionAt(range.end);

                    const newDecorations = [{
                        range: new monaco.Range(startPos.lineNumber, startPos.column, endPos.lineNumber, endPos.column),
                        options: {
                            isWholeLine: false,
                            inlineClassName: 'json-field-highlight'
                        }
                    }];

                    jsonHighlightDecorations = monacoEditor.deltaDecorations([], newDecorations);
                    monacoEditor.revealLineInCenter(startPos.lineNumber);
                } else {
                    jsonInput.setSelectionRange(range.start, range.end);
                    jsonInput.scrollIntoView();
                }
            } catch (e) {
                // Silent fail if JSON parse fails
            }
        }

        function updatePathValue(path, newVal) {
            try {
                const pathArr = splitPath(path);
                const current = getPathValue(rawData, pathArr);
                const parsed = parseByExistingType(newVal, current);
                rawData = setPathValue(rawData, pathArr, parsed);

                // Set flag to prevent circular updates
                isUpdatingFromGrid = true;

                // Always push grid edits to JSON panel immediately
                syncJsonFromGrid(false);

                // Highlight the exact edited record in JSON panel
                highlightJsonPath(path);

                // Don't re-render grid during editing to allow multi-character input
                // Only update JSON side; grid stays interactive while user types

                setStatus(undefined, `Updated ${path}`);

                // Reset flag
                isUpdatingFromGrid = false;
            } catch (e) {
                isUpdatingFromGrid = false;
                setStatus(undefined, 'Update failed: ' + e.message);
            }
        }

        function renameColumn(oldName, newName) {
            if (!Array.isArray(rawData)) {
                renderGrid();
                return;
            }
            const trimmed = String(newName || '').trim();
            if (!trimmed || trimmed === oldName) {
                renderGrid();
                return;
            }
            if (columns.includes(trimmed)) {
                setStatus(undefined, `Column name already exists: ${trimmed}`);
                renderGrid();
                return;
            }

            rawData.forEach(row => {
                if (!row || typeof row !== 'object' || Array.isArray(row)) return;
                if (Object.prototype.hasOwnProperty.call(row, oldName)) {
                    row[trimmed] = row[oldName];
                    delete row[oldName];
                }
            });

            columns = columns.map(col => col === oldName ? trimmed : col);
            syncJsonFromGrid(true);
            setStatus(undefined, `Renamed ${oldName} to ${trimmed}`);
        }

        function syncJsonFromGrid(reRender = true) {
            setEditorValue(JSON.stringify(rawData, null, 2));
            columns = collectColumns(rawData);
            syncColumnSelection(columns);
            if (columnsPanelOpen) renderColumnsPanel();
            syncGutter();
            syncJsonHighlighter();
            if (reRender) renderGrid();
        }

        function downloadJson() {
            const data = JSON.stringify(rawData, null, 2);
            downloadBlob(data, 'application/json', 'json_grid_data.json');
            setStatus(undefined, 'JSON downloaded');
        }

        function flattenForCsv(obj, prefix = '', res = {}) {
            if (Array.isArray(obj)) {
                if (obj.every(v => !(Array.isArray(v) || isObject(v)))) {
                    res[prefix || 'value'] = obj.join(' | ');
                } else {
                    obj.forEach((v, i) => flattenForCsv(v, prefix ? `${prefix}[${i}]` : `[${i}]`, res));
                }
                return res;
            }
            if (isObject(obj)) {
                Object.keys(obj).forEach(k => flattenForCsv(obj[k], prefix ? `${prefix}.${k}` : k, res));
                return res;
            }
            res[prefix || 'value'] = obj ?? '';
            return res;
        }

        function downloadCsv() {
            const csvRows = Array.isArray(rawData) ? rawData : [rawData];
            if (!csvRows.length) { alert('No data available to export.'); return; }
            const flatRows = csvRows.map(r => flattenForCsv(r));
            const cols = [...new Set(flatRows.flatMap(r => Object.keys(r)))];
            const lines = [];
            lines.push(cols.map(csvEscape).join(','));
            flatRows.forEach(r => {
                lines.push(cols.map(c => csvEscape(r[c] ?? '')).join(','));
            });
            downloadBlob(lines.join('\n'), 'text/csv;charset=utf-8;', 'pgsv_json_grid_data.csv');
            setStatus(undefined, 'CSV downloaded');
        }

        function csvEscape(v) {
            const s = String(v ?? '');
            if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
            return s;
        }
        function downloadBlob(content, type, filename) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(url);
        }

        function initDivider() {
            const divider = q('divider');
            const workspace = q('workspace');
            let dragging = false;
            function move(clientX) {
                const rect = workspace.getBoundingClientRect();
                let percent = ((clientX - rect.left) / rect.width) * 100;
                percent = Math.max(20, Math.min(80, percent));
                document.documentElement.style.setProperty('--split-left', percent + '%');
                setStatus(undefined, `Panel width adjusted: ${Math.round(percent)}% / ${Math.round(100 - percent)}%`);
            }
            divider.addEventListener('mousedown', (e) => { dragging = true; document.body.style.userSelect = 'none'; e.preventDefault(); });
            window.addEventListener('mousemove', (e) => { if (dragging) move(e.clientX); });
            window.addEventListener('mouseup', () => { if (dragging) { dragging = false; document.body.style.userSelect = ''; } });
            divider.addEventListener('dblclick', () => { document.documentElement.style.setProperty('--split-left', '48%'); setStatus(undefined, 'Panel width reset'); });
        }

        function escapeHtml(str) { return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;').replace(/'/g, '&#39;'); }
        function escapeAttr(str) { return escapeHtml(str).replace(/\n/g, '&#10;'); }
        function esc(str) { return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

        window.addEventListener('load', () => {
            try {
                applyTheme(localStorage.getItem('jsonGridTheme') || 'light');
            } catch (e) {
                applyTheme('light');
            }
            initDivider();
            syncGutter();
            syncJsonHighlighter();
            initMonacoEditor();
            renderJsonTree();

            document.addEventListener('click', (e) => {
                const panel = q('columnsPanel');
                const group = document.querySelector('.grid-toolbar-group');
                if (!panel || !group || !columnsPanelOpen) return;
                if (!group.contains(e.target)) {
                    closeColumnsPanel(true);
                }
            });
        });
    </script>
</body>

</html>
